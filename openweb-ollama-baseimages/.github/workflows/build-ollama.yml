name: Build Ollama Custom Image

# Ref: https://docs.github.com/en/actions/publishing-packages/publishing-docker-images
on:
  push:
    branches: [ "main" ]
    paths:
      - "ollama/**"
      - ".github/workflows/build-ollama.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ollama-custom

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # [개선점 1] git short SHA 태그 추가 — 롤백 및 빌드 추적 가능
      - name: Generate image metadata
        id: meta
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Ollama custom image
        uses: docker/build-push-action@v6
        with:
          context: ./ollama
          file: ./ollama/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          platforms: linux/amd64
